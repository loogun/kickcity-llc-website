kind = "web"
previewPath = "/"
title = "Kick City LLC"
version = "1.0.0"
id = "artifacts/kick-city"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20576

[services.development]
run = "pnpm --filter @workspace/kick-city run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kick-city", "run", "build" ]
publicDir = "artifacts/kick-city/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20576"
BASE_PATH = "/"
